<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Wizards GLB Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --text: #f2f4f8;
      --muted: #aab2c0;
      --danger: #ff8c8c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      touch-action: none;
    }

    body {
      display: grid;
      grid-template-rows: 1fr;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0) 42%),
        radial-gradient(circle at 50% 118%, rgba(114, 208, 255, 0.16), transparent 38%),
        #111318;
    }

    .status {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 2;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      user-select: none;
    }

    .status[data-visible="true"],
    .status[data-kind="error"] {
      opacity: 1;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 500ms ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(300px, 75vw);
    }

    .loader-title {
      margin: 0;
      font-size: clamp(0.85rem, 3vw, 1rem);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: var(--text);
      border-radius: 2px;
      transition: width 120ms linear;
    }

    .loader-bar.indeterminate {
      width: 40%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    .loader-pct {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <canvas id="viewer" aria-label="3D model viewer"></canvas>
  <div class="status" id="status" aria-live="polite"></div>

  <div id="loader" aria-label="Loading" role="status">
    <div class="loader-inner">
      <p class="loader-title">Loading Wizards</p>
      <div class="loader-track">
        <div class="loader-bar indeterminate" id="loader-bar"></div>
      </div>
      <p class="loader-pct" id="loader-pct"></p>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const MODEL_URLS = [
      "./wizards.glb"
    ];

    const canvas = document.getElementById("viewer");
    const status = document.getElementById("status");
    const loaderEl = document.getElementById("loader");
    const loaderBar = document.getElementById("loader-bar");
    const loaderPct = document.getElementById("loader-pct");

    function setProgress(loaded, total) {
      if (total > 0) {
        const pct = Math.min(100, Math.round((loaded / total) * 100));
        loaderBar.classList.remove("indeterminate");
        loaderBar.style.width = pct + "%";
        loaderPct.textContent = pct + "%";
      }
    }

    function hideLoader() {
      loaderEl.classList.add("hidden");
      loaderEl.addEventListener("transitionend", () => loaderEl.remove(), { once: true });
    }

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: false,
      alpha: false,
      powerPreference: "high-performance"
    });
    renderer.setClearColor(0x111318, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
    camera.position.set(0, 1.2, 4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.minDistance = 0.35;
    controls.maxDistance = 50;
    controls.target.set(0, 0.8, 0);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x334055, 2.2);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
    keyLight.position.set(3, 5, 4);
    scene.add(keyLight);

    const loader = new GLTFLoader();
    let activeModel = null;
    let animationFrame = 0;
    let isVisible = true;
    let statusTimer = 0;

    function setStatus(message, kind = "info") {
      status.textContent = message;
      status.dataset.kind = kind;
      status.dataset.visible = kind === "error" ? "true" : "false";
      clearTimeout(statusTimer);
      if (kind !== "error") {
        statusTimer = setTimeout(() => {
          status.dataset.visible = "false";
        }, 900);
      }
    }

    function disposeObject(object) {
      object.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        if (!child.material) return;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        for (const material of materials) {
          for (const value of Object.values(material)) {
            if (value && value.isTexture) value.dispose();
          }
          material.dispose();
        }
      });
    }

    function clearModel() {
      if (activeModel) {
        scene.remove(activeModel);
        disposeObject(activeModel);
        activeModel = null;
      }
    }

    function frameModel(model) {
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDimension = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxDimension / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
      const viewDistance = distance * 1.55;

      model.position.sub(center);
      controls.target.set(0, 0, 0);
      camera.near = Math.max(maxDimension / 1000, 0.01);
      camera.far = Math.max(maxDimension * 100, 100);
      camera.position.set(viewDistance, maxDimension * 0.18, 0);
      camera.updateProjectionMatrix();
      controls.minDistance = Math.max(maxDimension * 0.35, 0.05);
      controls.maxDistance = Math.max(maxDimension * 8, 5);
      controls.update();
    }

    async function loadModel(url, label) {
      return new Promise((resolve, reject) => {
        loader.load(
          url,
          (gltf) => {
            clearModel();
            activeModel = gltf.scene;
            scene.add(activeModel);
            frameModel(activeModel);
            hideLoader();
            setStatus(label);
            resolve();
          },
          (xhr) => setProgress(xhr.loaded, xhr.total),
          reject
        );
      });
    }

    async function loadDefaultModel() {
      for (const url of MODEL_URLS) {
        try {
          await loadModel(url, "wizards.glb loaded");
          return;
        } catch {
          continue;
        }
      }
      setStatus("Model not found.", "error");
    }

    function resize() {
      const width = Math.max(window.innerWidth, 1);
      const height = Math.max(window.innerHeight, 1);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function render() {
      if (!isVisible) return;
      controls.update();
      renderer.render(scene, camera);
      animationFrame = requestAnimationFrame(render);
    }

    function startRenderLoop() {
      if (!animationFrame) animationFrame = requestAnimationFrame(render);
    }

    function stopRenderLoop() {
      if (!animationFrame) return;
      cancelAnimationFrame(animationFrame);
      animationFrame = 0;
    }

    window.addEventListener("resize", resize, { passive: true });
    document.addEventListener("visibilitychange", () => {
      isVisible = document.visibilityState === "visible";
      if (isVisible) startRenderLoop();
      else stopRenderLoop();
    });

    resize();
    startRenderLoop();
    loadDefaultModel();
  </script>
</body>
</html>
